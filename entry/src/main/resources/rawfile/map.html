<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BIT Map</title>
    <!-- 🔥 修改处：引用本地资源，实现纯离线框架 -->
    <link rel="stylesheet" href="leaflet.css" />
    <script src="leaflet.js"></script>
    <style>
        body { padding: 0; margin: 0; }
        html, body, #map { height: 100%; width: 100%; background: #f0f0f0; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    // 1. 初始化地图，使用 Simple CRS (平面坐标系)
    var map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: 1,
        maxZoom: 19,
        zoomControl: false,
        attributionControl: false,
        zoomSnap: 0.1 // 允许小数级缩放
    }).setView([-200, 200], 16);

    // 2. 配置瓦片层
    L.tileLayer('https://map.bit101.flwfdd.xyz/tile/{z}/{x}/{y}.png', {
        maxZoom: 19,
        tileSize: 256,
    }).addTo(map);

    // 3. 核心功能：跳转到指定位置 (ArkTS 调用)
    window.flyToPosition = function(x, y, zoom) {
         // 计算世界总像素宽度 (256 * 2^zoom)
         var totalPixels = 256 * Math.pow(2, zoom);

         // 计算目标像素坐标
         var targetX = x * totalPixels;
         var targetY = y * totalPixels;

         // 转换为 Leaflet LatLng
         var latLng = map.unproject(L.point(targetX, targetY), zoom);

         // 平滑飞行
         map.setView(latLng, zoom, {
             animate: false // 初始化恢复位置时建议直接跳转，不要动画，否则可能位置飘逸
         });
    }

    // 4. 核心功能：设置缩放 (ArkTS Slider 调用)
    window.setZoom = function(zoom) {
        map.setZoom(zoom);
    }

    // 5. 核心功能：向 ArkTS 汇报当前位置 (用于记忆位置)
    function reportState() {
        var zoom = map.getZoom();
        // 反向计算：将 Leaflet 坐标转回 0.0~1.0 的相对坐标
        var point = map.project(map.getCenter(), zoom);
        var totalPixels = 256 * Math.pow(2, zoom);
        var x = point.x / totalPixels;
        var y = point.y / totalPixels;

        var msg = { type: 'map_state', x: x, y: y, zoom: zoom };
        // 通过 console.log 传递给 ArkTS 的 onConsole
        console.log("FromJS:" + JSON.stringify(msg));
    }

    // 绑定事件：移动或缩放结束时汇报
    map.on('moveend zoomend', reportState);
</script>
</body>
</html>
